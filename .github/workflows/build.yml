name: Build

on:
  push:
    paths-ignore:
      - "**.md"
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: "${{ github.workflow }}-${{ github.ref }}"
  cancel-in-progress: true

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: temurin

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: mihomo/go.mod

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Download GeoIP files
        run: ./gradlew :android:downloadGeoFiles

      - name: Build Debug APK
        run: ./gradlew :android:assembleDebug

      - name: Build Release APK
        run: ./gradlew :android:assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v7
        with:
          name: Mishka-debug
          path: android/build/outputs/apk/debug/*.apk
          archive: false

      - name: Upload Release APK
        uses: actions/upload-artifact@v7
        with:
          name: Mishka-release
          path: android/build/outputs/apk/release/*.apk
          archive: false
